<!DOCTYPE html>
<html lang="en">

<head>

     <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NP8F2S4STN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NP8F2S4STN');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Amazon Picks | Little Orbit World</title>

    <meta name="description"
        content="Discover the latest Amazon products featured in our AI videos. Shop trusted recommendations with our affiliate links.">

    <link rel="stylesheet" href="style.css?v=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="container">

            <h1>Amazon Picks</h1>

            <p class="tagline">
                Latest Amazon products featured in our AI Instagram videos.
            </p>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- Search Section -->

        <section class="search-section">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search products..."
                autocomplete="off">

        </section>

        <!-- Result Count -->

        <section class="info-bar">

            <p id="productCount">
                Loading products...
            </p>

        </section>

        <!-- Products -->

        <section
            id="productsContainer"
            class="products-grid">

            <!-- Products are loaded by JavaScript -->

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="container">

            <p>
                <strong>Disclosure:</strong>
                As an Amazon Associate, we earn from qualifying purchases.
            </p>

            <p>
                © 2026 Little Orbit World. All Rights Reserved.
            </p>

        </div>

    </footer>

    <!-- ================= TEMPLATE ================= -->

    <template id="productTemplate">

        <div class="product-card">

            <div class="card-header">

                <span class="category"></span>

                <span class="latest-badge">
                    NEW
                </span>

            </div>

            <h2 class="product-name"></h2>

            <p class="price"></p>

            <a
                class="buy-button"
                target="_blank"
                rel="noopener noreferrer">

                Buy on Amazon

            </a>

        </div>

    </template>

    <script src="script.js?v=1"></script>

</body>

</html>
